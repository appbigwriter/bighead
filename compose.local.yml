name: bighead-local-app

services:
  web:
    environment:
      APP_ENV: test
      ALLOW_INSECURE_LOCAL_PRODUCTION: "true"
      APP_URL: ${APP_URL}
      API_URL: http://api:8000
      SUPABASE_SERVER_URL: ${SUPABASE_URL}
      SUPABASE_AUTH_SITE_URL: ${SUPABASE_AUTH_SITE_URL}
      SUPABASE_AUTH_REDIRECT_URLS: ${SUPABASE_AUTH_REDIRECT_URLS}
      SUPABASE_AUTH_SMTP_CONFIGURED: "true"
    extra_hosts:
      - host.docker.internal:host-gateway

  api:
    environment:
      APP_ENV: test
      APP_URL: ${APP_URL}
      API_URL: ${API_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
    extra_hosts:
      - host.docker.internal:host-gateway

  worker:
    environment:
      APP_ENV: test
    extra_hosts:
      - host.docker.internal:host-gateway
