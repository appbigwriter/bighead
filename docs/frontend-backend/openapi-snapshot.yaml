      type: object
      required:
      - userId
      title: MembershipPatchRequest
    Message:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        roomId:
          type: string
          format: uuid
          title: Roomid
        parentMessageId:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Parentmessageid
        authorUserId:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Authoruserid
        body:
          type: string
          title: Body
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
        editedAt:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Editedat
        deletedAt:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Deletedat
        createdAt:
          type: string
          format: date-time
          title: Createdat
      type: object
      required:
      - id
      - roomId
      - body
      - metadata
      - createdAt
      title: Message
    MessageCreateRequest:
      properties:
        body:
          type: string
          maxLength: 100000
          minLength: 1
          title: Body
        parentMessageId:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Parentmessageid
        clientId:
          anyOf:
          - type: string
            maxLength: 120
          - type: 'null'
          title: Clientid
      type: object
      required:
      - body
