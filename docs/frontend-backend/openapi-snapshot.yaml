openapi: 3.1.0
info:
  title: BigHead API
  version: 0.3.0
  description: 'Contrato canônico Sprint 3: matriz T01-T56 e implementação FastAPI.'
servers:
- url: http://localhost:8000
  description: Local
paths:
  /v1/auth/login:
    post:
      tags:
      - access
      summary: Login
      operationId: login_v1_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '401':
          $ref: '#/components/responses/Problem'
        '429':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T01
      x-bighead-role: publico
      x-bighead-cache-event: '`no-store`; incrementa rate-limit'
      x-bighead-critical-error: credenciais invalidas sem enumerar email
  /v1/auth/recovery:
    post:
      tags:
      - access
      summary: Recovery
      operationId: recovery_v1_auth_recovery_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoveryRequest'
        required: true
      responses:
        '202':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecoveryRequestedResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '400':
          $ref: '#/components/responses/Problem'
        '410':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T02
      x-bighead-role: publico
      x-bighead-cache-event: sem cache; emite `auth.recovery.requested`
      x-bighead-critical-error: token expirado ou usado
  /v1/invitations/{token}/accept:
    post:
      tags:
      - access
      summary: Accept Invitation
      operationId: accept_invitation_v1_invitations__token__accept_post
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
          title: Token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvitationAcceptRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationAcceptResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '410':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T03
      x-bighead-role: publico
      x-bighead-cache-event: token unico; invalida convites
      x-bighead-critical-error: convite revogado ou email divergente
  /v1/onboarding:
    post:
      tags:
      - access
      summary: Onboarding
      operationId: onboarding_v1_onboarding_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OnboardingSubmitRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OnboardingSubmitResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '401':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T04
      x-bighead-role: autenticado sem membership
      x-bighead-cache-event: salva progresso local; `onboarding.completed`
      x-bighead-critical-error: sessao expirada no wizard
  /v1/organizations:
    get:
      tags:
      - access
      summary: Organizations
      operationId: organizations_v1_organizations_get
      parameters:
      - name: includeSuspended
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Includesuspended
      - name: currentOrganizationId
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Currentorganizationid
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '403':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T05
      x-bighead-role: member
      x-bighead-cache-event: invalida cache do tenant ao trocar
      x-bighead-critical-error: tenant removido durante selecao
  /v1/analytics/summary:
    get:
      tags:
      - analytics
      operationId: t48Get
      summary: T48 - /v1/analytics/summary
      x-bighead-screen: T06
      x-bighead-role: owner/analyst
      x-bighead-cache-event: freshness por card; `analytics.summary.updated`
      x-bighead-critical-error: KPI parcial
      responses:
        '200':
          description: T48 successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutiveDashboardResponse'
        '206':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
      security:
      - HTTPBearer: []
      x-bighead-screens:
      - T06
      - T48
  /v1/search/global:
    post:
      tags:
      - search
      operationId: t07Post
      summary: T07 - /v1/search/global
      x-bighead-screen: T07
      x-bighead-role: member
      x-bighead-cache-event: '`no-store`; analytics de busca'
      x-bighead-critical-error: recurso removido ou sem acesso
      responses:
        '200':
          description: T07 successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalSearchResponse'
        '403':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GlobalSearchRequest'
      security:
      - HTTPBearer: []
  /v1/notifications:
    get:
      tags:
      - notifications
      operationId: t08Get
      summary: T08 - /v1/notifications
      x-bighead-screen: T08
      x-bighead-role: member
      x-bighead-cache-event: polling/realtime; `notifications.updated`
      x-bighead-critical-error: alvo sem acesso ao abrir
      responses:
        '200':
          description: T08 successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '403':
          $ref: '#/components/responses/Problem'
      security:
      - HTTPBearer: []
  /v1/preferences:
    get:
      tags:
      - access
      summary: Get Preferences
      operationId: get_preferences_v1_preferences_get
      parameters:
      - name: x-organization-id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: X-Organization-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreferencesResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '409':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T09
      x-bighead-role: member
      x-bighead-cache-event: persistencia local + invalida perfil
      x-bighead-critical-error: conflito de preferencia
    patch:
      tags:
      - access
      summary: Patch Preferences
      operationId: patch_preferences_v1_preferences_patch
      parameters:
      - name: x-organization-id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: X-Organization-Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferencesPatchRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreferencesResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '409':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T09
      x-bighead-role: member
      x-bighead-cache-event: persistencia local + invalida perfil
      x-bighead-critical-error: conflito de preferencia
  /v1/rooms:
    get:
      tags:
      - collaboration
      summary: Rooms
      operationId: rooms_v1_rooms_get
      parameters:
      - name: visibility
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Visibility
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 50
          title: Limit
      - name: x-organization-id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: X-Organization-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '201':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T10
      x-bighead-role: member
      x-bighead-cache-event: cursor + counters; `rooms.updated`
      x-bighead-critical-error: sala privada filtrada incorretamente
    post:
      tags:
      - collaboration
      summary: Create Room
      operationId: create_room_v1_rooms_post
      parameters:
      - name: x-organization-id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: X-Organization-Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomCreateRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '200':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T10
      x-bighead-role: member
      x-bighead-cache-event: cursor + counters; `rooms.updated`
      x-bighead-critical-error: sala privada filtrada incorretamente
  /v1/rooms/{roomId}/messages:
    get:
      tags:
      - rooms
      operationId: t11Get
      summary: T11 - /v1/rooms/{roomId}/messages
      x-bighead-screen: T11
      x-bighead-role: member
      x-bighead-cache-event: realtime + dedupe; `messages.created`
      x-bighead-critical-error: upload/reconnect falho com duplicidade
      responses:
        '200':
          description: T11 successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageListResponse'
        '403':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
      parameters:
      - name: roomId
        in: path
        required: true
        schema:
          type: string
      security:
      - HTTPBearer: []
  /v1/rooms/{roomId}:
    patch:
      tags:
      - rooms
      operationId: t12Patch
      summary: T12 - /v1/rooms/{roomId}
      x-bighead-screen: T12
      x-bighead-role: manager
      x-bighead-cache-event: invalida membros e detalhe da sala
      x-bighead-critical-error: ultimo moderador removido
      responses:
        '200':
          description: T12 successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomDetailResponse'
        '403':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
      parameters:
      - name: roomId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomPatchRequest'
      security:
      - HTTPBearer: []
  /v1/rooms/{roomId}/files:
    get:
      tags:
      - rooms
      operationId: t13Get
      summary: T13 - /v1/rooms/{roomId}/files
      x-bighead-screen: T13
      x-bighead-role: member
      x-bighead-cache-event: signed URL curta; `files.quarantine.updated`
      x-bighead-critical-error: arquivo em quarantine
      responses:
        '200':
          description: T13 successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomFileListResponse'
        '403':
          $ref: '#/components/responses/Problem'
        '410':
          $ref: '#/components/responses/Problem'
      parameters:
      - name: roomId
        in: path
        required: true
        schema:
          type: string
      security:
      - HTTPBearer: []
  /v1/tasks:
    get:
      tags:
      - collaboration
      - tasks
      summary: Tasks
      operationId: tasks_v1_tasks_get
      parameters:
      - name: status
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/TaskStatus'
          - type: 'null'
          title: Status
      - name: cursor
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Cursor
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 50
          title: Limit
      - name: x-organization-id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: X-Organization-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '403':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T14
      x-bighead-role: member
      x-bighead-cache-event: cursor + views; `tasks.updated`
      x-bighead-critical-error: lista vazia sem CTA
    post:
      tags:
      - collaboration
      - tasks
      summary: Create Task
      operationId: create_task_v1_tasks_post
      parameters:
      - name: Idempotency-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Idempotency-Key
      - name: x-organization-id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: X-Organization-Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreateRequest'
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCreateResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '409':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T15
      x-bighead-role: member
      x-bighead-cache-event: '`Idempotency-Key`; `tasks.created`'
      x-bighead-critical-error: dependencia circular
  /v1/tasks/{taskId}/transition:
    post:
      tags:
      - tasks
      operationId: t16Post
      summary: T16 - /v1/tasks/{taskId}/transition
      x-bighead-screen: T16
      x-bighead-role: member/reviewer
      x-bighead-cache-event: invalida detalhe; `tasks.transitioned`
      x-bighead-critical-error: conflito `409` preservando comentario
      responses:
        '200':
          description: T16 successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskTransitionResponse'
        '403':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
      parameters:
      - name: taskId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskTransitionRequest'
      security:
      - HTTPBearer: []
  /v1/runs:
    get:
      tags:
      - runs
      operationId: t17Get
      summary: T17 - /v1/runs
      x-bighead-screen: T17
      x-bighead-role: member
      x-bighead-cache-event: polling/realtime; `runs.updated`
      x-bighead-critical-error: lease expirado
      responses:
        '200':
          description: T17 successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunListResponse'
        '403':
          $ref: '#/components/responses/Problem'
      security:
      - HTTPBearer: []
  /v1/failures:
    get:
      tags:
      - failures
      operationId: t18Get
      summary: T18 - /v1/failures
      x-bighead-screen: T18
      x-bighead-role: manager
      x-bighead-cache-event: agregacao por grupo; `failures.updated`
      x-bighead-critical-error: retry indisponivel
      responses:
        '200':
          description: T18 successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FailureGroupResponse'
        '403':
          $ref: '#/components/responses/Problem'
      security:
      - HTTPBearer: []
  /v1/tasks/calendar:
    get:
      tags:
      - collaboration
      - tasks
      summary: Calendar
      operationId: calendar_v1_tasks_calendar_get
      parameters:
      - name: from
        in: query
        required: true
        schema:
          type: string
          format: date
          title: From
      - name: to
        in: query
        required: true
        schema:
          type: string
          format: date
          title: To
      - name: ownerIds
        in: query
        required: false
        schema:
          type: array
          items:
            type: string
            format: uuid
          default: []
          title: Ownerids
      - name: x-organization-id
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: X-Organization-Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskCalendarResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
        '403':
          $ref: '#/components/responses/Problem'
      x-bighead-screen: T19
      x-bighead-role: manager
      x-bighead-cache-event: calendario; `sla.recomputed`
      x-bighead-critical-error: reagendamento sem permissao
  /v1/approvals:
    get:
      tags:
      - approvals
      operationId: t20Get
      summary: T20 - /v1/approvals
      x-bighead-screen: T20
      x-bighead-role: reviewer
      x-bighead-cache-event: inbox ordenada; `approvals.updated`
      x-bighead-critical-error: autoaprovacao bloqueada
      responses:
        '200':
          description: T20 successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalListResponse'
        '403':
          $ref: '#/components/responses/Problem'
      security:
      - HTTPBearer: []
  /v1/approvals/{approvalId}/decision:
    post:
      tags:
      - approvals
      operationId: t21Post
      summary: T21 - /v1/approvals/{approvalId}/decision
      x-bighead-screen: T21
      x-bighead-role: reviewer
      x-bighead-cache-event: decisao imutavel; `approvals.decided`
      x-bighead-critical-error: decisao concorrente
      responses:
        '200':
          description: T21 successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalDecisionResponse'
        '403':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
      parameters:
      - name: approvalId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalDecisionRequest'
      security:
      - HTTPBearer: []
  /v1/approvals/{approvalId}/scorecard:
    get:
      tags:
      - approvals
      operationId: t22Get
      summary: T22 - /v1/approvals/{approvalId}/scorecard
      x-bighead-screen: T22
      x-bighead-role: reviewer
      x-bighead-cache-event: sem cache longo
      x-bighead-critical-error: score reprovado sem motivo explicito
      responses:
        '200':
          description: T22 successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScorecardResponse'
        '403':
          $ref: '#/components/responses/Problem'
      parameters:
      - name: approvalId
        in: path
        required: true
        schema:
          type: string
      security:
      - HTTPBearer: []
  /v1/policies/approvals:
    get:
      tags:
      - policies
      operationId: t23Get
      summary: T23 - /v1/policies/approvals
      x-bighead-screen: T23
      x-bighead-role: owner/admin
      x-bighead-cache-event: versao de politica; `policy.updated`
      x-bighead-critical-error: lacuna de risco na simulacao
      responses:
        '200':
          description: T23 successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalPolicyResponse'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
      security:
      - HTTPBearer: []
    patch:
      tags:
      - policies
      operationId: t23Patch
      summary: T23 - /v1/policies/approvals
      x-bighead-screen: T23
      x-bighead-role: owner/admin
      x-bighead-cache-event: versao de politica; `policy.updated`
      x-bighead-critical-error: lacuna de risco na simulacao
      responses:
        '200':
          description: T23 successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApprovalPolicyResponse'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApprovalPolicyPatchRequest'
      security:
