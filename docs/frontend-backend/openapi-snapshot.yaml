          title: Name
        slug:
          type: string
          title: Slug
        timezone:
          type: string
          title: Timezone
        locale:
          type: string
          title: Locale
      type: object
      required:
      - id
      - name
      - slug
      - timezone
      - locale
      title: Organization
    OrganizationInput:
      properties:
        name:
