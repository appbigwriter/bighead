components:
  securitySchemes:
    HTTPBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    Problem:
      description: Erro no formato RFC 9457
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
  schemas:
    ArtifactDownloadResponse:
      properties:
        artifactId:
          type: string
          format: uuid
          title: Artifactid
        downloadUrl:
          type: string
          title: Downloadurl
        expiresAt:
          type: string
          format: date-time
          title: Expiresat
      type: object
      required:
      - artifactId
      - downloadUrl
      - expiresAt
      title: ArtifactDownloadResponse
    ArtifactStatusResponse:
      properties:
        artifactId:
          type: string
          format: uuid
          title: Artifactid
        quarantineStatus:
          $ref: '#/components/schemas/QuarantineStatus'
      type: object
      required:
      - artifactId
      - quarantineStatus
      title: ArtifactStatusResponse
    AuthCallbackRequest:
      properties:
        code:
          type: string
          maxLength: 2048
          minLength: 8
          title: Code
        codeVerifier:
          type: string
          maxLength: 128
          minLength: 43
          title: Codeverifier
      type: object
      required:
      - code
      - codeVerifier
      title: AuthCallbackRequest
    AuthSessionResponse:
      properties:
        session:
          anyOf:
          - $ref: '#/components/schemas/Session'
          - type: 'null'
        user:
          $ref: '#/components/schemas/AuthUser'
        memberships:
          items:
            $ref: '#/components/schemas/Membership'
          type: array
          title: Memberships
        status:
          type: string
          title: Status
          default: authenticated
      type: object
      required:
      - session
      - user
      - memberships
      title: AuthSessionResponse
    AuthUser:
      properties:
        id:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Id
        email:
          type: string
          format: email
          title: Email
        sessionId:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: Sessionid
        expiresAt:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Expiresat
      type: object
      required:
      - id
      - email
      title: AuthUser
    CalendarDay:
      properties:
        date:
          type: string
          title: Date
        tasks:
          items:
            $ref: '#/components/schemas/Task'
          type: array
          title: Tasks
      type: object
      required:
      - date
      - tasks
      title: CalendarDay
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    InvitationAcceptRequest:
      properties:
        fullName:
          type: string
          maxLength: 120
          minLength: 1
          title: Fullname
        password:
          anyOf:
          - type: string
            maxLength: 128
            minLength: 8
          - type: 'null'
          title: Password
        accept:
          type: boolean
          title: Accept
      type: object
      required:
      - fullName
      - accept
      title: InvitationAcceptRequest
    InvitationAcceptResponse:
      properties:
        membership:
          $ref: '#/components/schemas/Membership'
        nextRoute:
          type: string
          title: Nextroute
          default: /operacao/home
      type: object
      required:
      - membership
      title: InvitationAcceptResponse
    InvitationCreateRequest:
      properties:
        email:
          type: string
          format: email
          title: Email
        role:
          $ref: '#/components/schemas/MemberRole'
          default: member
        expiresInHours:
          type: integer
          maximum: 720.0
          minimum: 1.0
          title: Expiresinhours
          default: 72
      type: object
      required:
      - email
      title: InvitationCreateRequest
    InvitationCreatedResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
        email:
          type: string
          format: email
          title: Email
        role:
          $ref: '#/components/schemas/MemberRole'
        expiresAt:
          type: string
          format: date-time
          title: Expiresat
        token:
          anyOf:
          - type: string
          - type: 'null'
          title: Token
      type: object
      required:
      - id
      - email
      - role
      - expiresAt
      title: InvitationCreatedResponse
    LoginRequest:
      properties:
        email:
          type: string
          format: email
          title: Email
        passwordOrMagicLink:
          anyOf:
          - type: string
          - type: 'null'
          title: Passwordormagiclink
        provider:
          anyOf:
          - type: string
          - type: 'null'
          title: Provider
      type: object
      required:
      - email
      title: LoginRequest
